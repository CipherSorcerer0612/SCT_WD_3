<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="stylesheet" href="quiz.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="app">
    <div class="screen active" id="intro-screen">
      <div class="intro-top">
        <div class="wordmark">Quiz<em>.</em></div>
        <div class="intro-desc">15 questions across six subjects. Tracks your strengths and shows where to improve.</div>
      </div>
      <div class="meta-row">
        <div class="meta-pill"><div class="meta-dot"></div>15 Questions</div>
        <div class="meta-pill"><div class="meta-dot meta-dot--correct"></div>30 sec each</div>
        <div class="meta-pill"><div class="meta-dot meta-dot--amber"></div>Weakness analysis</div>
      </div>
      <div class="section-title section-title--intro">Subjects</div>
      <div class="subject-list" id="subject-list"></div>
      <button class="btn-start" id="btn-start">Start Quiz &nbsp;→</button>
    </div>

    <div class="screen" id="quiz-screen">
      <div class="quiz-bar">
        <span class="q-num" id="q-num">1 / 15</span>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
        <div class="timer-wrap">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span class="timer-val" id="timer-val">30</span>
        </div>
        <div class="score-tag" id="score-tag">0 pts</div>
      </div>

      <div class="q-card">
        <div class="cat-tag" id="cat-tag"></div>
        <div class="q-text" id="q-text"></div>
        <div class="q-hint" id="q-hint"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 5v4M6 3.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg><span id="q-hint-txt"></span></div>
      </div>

      <div class="answer-area" id="answer-area"></div>

      <div class="feedback" id="feedback">
        <span class="fb-ico" id="fb-ico"></span>
        <div><div class="fb-head" id="fb-head"></div><div class="fb-body" id="fb-body"></div></div>
      </div>

      <div class="action-row">
        <button class="btn-skip" id="skip-btn">Skip</button>
        <button class="btn-check" id="check-btn" disabled>
          <span id="check-lbl">Check</span>
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="screen" id="result-screen">
      <div class="result-hero">
        <div class="result-score-big" id="res-big"></div>
        <div class="result-grade-label" id="res-sub"></div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-n" id="st-correct"></div><div class="stat-l">Correct</div></div>
          <div class="stat-box"><div class="stat-n" id="st-accuracy"></div><div class="stat-l">Accuracy</div></div>
          <div class="stat-box"><div class="stat-n" id="st-streak"></div><div class="stat-l">Best Streak</div></div>
        </div>
      </div>

      <div class="section-title">Performance by Subject</div>
      <div class="cat-bars" id="cat-bars"></div>

      <div class="section-title">Personalised Feedback</div>
      <div class="fb-cards" id="fb-cards"></div>

      <div class="divider"></div>
      <div class="section-title section-title--review">Question Review</div>
      <div class="review-list" id="review-list"></div>

      <div class="result-actions">
        <button class="btn-again" id="btn-again">Try Again</button>
      </div>
    </div>
  </div>
  <script src="quiz.js"></script>
</body>
</html>
